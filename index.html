    <title>我的私人导航站</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #f3f4f6;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
        }

        .nav-list {
            list-style: none;
            padding: 10px 0;
            margin: 0;
        }

        .nav-item a {
            display: block;
            padding: 12px 20px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .nav-item a:hover {
            background-color: #eff6ff;
            color: var(--primary-color);
        }

        /* 主体内容样式 */
        .main-content {
            margin-left: 240px;
            padding: 20px 40px;
            flex-grow: 1;
        }

        .category-section {
            margin-bottom: 40px;
            scroll-margin-top: 20px;
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid var(--primary-color);
        }

        /* 网格布局 */
        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        /* 卡片样式 */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .card img {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .card span {
            font-size: 0.9rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-header, .nav-item span { display: none; }
            .main-content { margin-left: 60px; padding: 20px; }
        }
    </style>
</head>

        // 平滑滚动
        document.querySelectorAll('.nav-item a').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetElement = document.getElementById(targetId);
                if (targetElement) {
                    window.scrollTo({
                        top: targetElement.offsetTop - 20,
                        behavior: 'smooth'
                    });
                }
            });
        });
